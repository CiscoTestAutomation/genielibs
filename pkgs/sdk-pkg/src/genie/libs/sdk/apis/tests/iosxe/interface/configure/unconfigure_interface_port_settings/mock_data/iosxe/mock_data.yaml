configure:
  commands:
    end:
      new_state: execute
    interface TE0/1/0: "interface TE0/1/0\r\n"
    line console 0:
      new_state: configure_line
    no logging console: ''
    no port-settings speed 1000: "no port-settings speed 1000\r\n"
    no port-settings duplex full: "no port-settings duplex full\r\n"
    no port-settings autoneg enable: "no port-settings autoneg enable\r\n"
  prompt: Encore-25(config)#
configure_line:
  commands:
    end:
      new_state: execute
    exec-timeout 0: ''
  prompt: Encore-25(config-line)#
connect:
  commands:
    '':
      new_state: execute
  preface: |-
    Trying mock_device ...
    Connected to mock_device.
    Escape character is '^]'.
  prompt: ''
execute:
  commands:
    config term:
      new_state: configure
    config-transaction:
      new_state: configure
    show version: ''
    term length 0: ''
    term width 0: ''
    show version | include operating mode: ''
  prompt: Encore-25#
