configure:
  commands:
    end:
      new_state: execute
    line console:
      new_state: configure_line
  prompt: Mando-7(config)#
configure_line:
  commands:
    end:
      new_state: execute
    exec-timeout 0: ''
    line vty: ''
    terminal width 511: ''
  prompt: Mando-7(config-line)#
connect:
  commands:
    ? ''
    : new_state: execute
  preface: 'Trying mock_device ...

    Connected to mock_device.

    Escape character is ''^]''.'
  prompt: ''
execute:
  commands:
    config term:
      new_state: configure
    show module:
